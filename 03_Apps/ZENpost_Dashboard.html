<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENpost | Call Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#14225D;--navy2:#1E3270;--navy3:#253780;
  --blue:#0067A2;--blue2:#0096D1;
  --cyan:#66FFFF;--cyan-dim:rgba(102,255,255,0.15);
  --ice:#EAF4FB;--pale:#C5DDF0;
  --white:#fff;--page:#F0F5FB;
  --text:#14225D;--text2:#4A5568;--text3:#718096;
  --green:#16A34A;--green-bg:#F0FFF4;--green-border:#9AE6B4;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-border:#FCD34D;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FCA5A5;
  --pink:#D53F8C;--pink-bg:#FFF0F7;
  --card:#fff;--card-border:#E2EBF5;
  --radius:10px;--radius-sm:6px;
  font-family:'DM Sans',-apple-system,sans-serif;
}
body{background:var(--page);color:var(--text);min-height:100vh}
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:#fff;border-radius:var(--radius);padding:36px 40px;width:340px;text-align:center}
.login-logo{font-size:22px;font-weight:600;color:var(--navy);letter-spacing:.5px;margin-bottom:6px}
.login-logo span{color:var(--cyan)}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
.login-input{width:100%;border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .15s}
.login-input:focus{border-color:var(--blue2)}
.login-btn{width:100%;background:var(--navy);color:var(--cyan);border:none;border-radius:var(--radius-sm);padding:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.login-btn:hover{background:var(--navy2)}
.login-error{font-size:12px;color:var(--red);margin-top:8px;display:none}
#app{display:none}
#topbar{background:var(--navy);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--navy2)}
.wordmark{font-size:16px;font-weight:600;color:#fff;letter-spacing:.4px}
.wordmark span{color:var(--cyan)}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-user{font-size:12px;color:rgba(255,255,255,.5)}
.logout-btn{font-size:12px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;font-family:inherit}
.logout-btn:hover{color:#fff}
#rep-tabs{background:var(--white);border-bottom:1px solid var(--card-border);padding:0 24px;display:flex;gap:0}
.rep-tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.rep-tab:hover{color:var(--text)}
.rep-tab.active{color:var(--navy);border-bottom-color:var(--cyan)}
#main{padding:28px 24px;max-width:1120px;margin:0 auto}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.section-title{font-size:16px;font-weight:600;color:var(--text)}
.section-count{font-size:12px;font-weight:500;background:var(--navy);color:var(--cyan);padding:2px 8px;border-radius:10px}
/* UPCOMING */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:36px}
.upcoming-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden}
.uc-top-bar{height:4px}
.bar-done{background:var(--cyan)}
.bar-pending{background:var(--amber)}
.uc-body{padding:16px 18px}
.uc-company{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:3px}
.uc-meta{font-size:12px;color:var(--text3);margin-bottom:12px}
.uc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.uc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px}
.badge-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-pending{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-prior{background:var(--cyan-dim);color:var(--navy);border:1px solid rgba(102,255,255,.4)}
.uc-prior-note{font-size:11px;color:var(--text3);margin:2px 0 8px;font-style:italic}
.uc-contact-row{margin-top:6px}
.contact-chip{display:inline-block;background:var(--ice);border:1px solid var(--pale);border-radius:4px;padding:2px 8px;margin:2px 2px 0 0;font-size:11px;color:var(--navy)}
.uc-actions{margin-top:12px;display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-navy{background:var(--navy);color:var(--cyan)}
.btn-navy:hover{background:var(--navy2)}
.btn-outline{background:transparent;border:1px solid var(--card-border);color:var(--text2)}
.btn-outline:hover{background:var(--ice)}
/* PAST CALLS */
.calls-list{display:flex;flex-direction:column;gap:14px}
.call-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden}
.call-header{padding:16px 20px;display:flex;align-items:flex-start;gap:16px;cursor:pointer;user-select:none}
.call-header:hover{background:rgba(20,34,93,.02)}
.score-circle{width:58px;height:58px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid}
.score-num{font-size:19px;font-weight:600;line-height:1}
.score-denom{font-size:9px;color:var(--text3)}
.s-green{border-color:var(--green);color:var(--green)}
.s-amber{border-color:var(--amber);color:var(--amber)}
.s-red{border-color:var(--red);color:var(--red)}
.call-info{flex:1;min-width:0}
.call-company{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:3px}
.call-meta-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.call-date{font-size:12px;color:var(--text3)}
.rep-chip{font-size:11px;font-weight:500;background:var(--ice);border:1px solid var(--pale);border-radius:10px;padding:2px 8px;color:var(--navy)}
.status-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.complete-chip{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.flag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.flag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:3px}
.flag-talk{background:#FEF3C7;color:#92400E;border:1px solid #FCD34D}
.flag-comp{background:var(--red-bg);color:#991B1B;border:1px solid var(--red-border)}
.flag-client{background:#EFF6FF;color:#1E40AF;border:1px solid #93C5FD}
.call-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.zdc-chip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.zdc-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.chevron{font-size:11px;color:var(--text3);transition:transform .2s;margin-top:2px}
.call-card.open .chevron{transform:rotate(180deg)}
/* CALL BODY */
.call-body{display:none;border-top:1px solid var(--card-border)}
.call-card.open .call-body{display:block}
.body-tabs{display:flex;border-bottom:1px solid var(--card-border);background:var(--ice)}
.body-tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.body-tab:hover{color:var(--text)}
.body-tab.active{color:var(--navy);border-bottom-color:var(--cyan);background:#fff}
.body-panel{display:none;padding:18px 20px}
.body-panel.active{display:block}
/* RUBRIC */
.rubric-table{width:100%;border-collapse:collapse}
.rubric-table tr{border-bottom:1px solid var(--card-border)}
.rubric-table tr:last-child{border-bottom:none}
.rubric-table td{padding:8px 0;font-size:12px;vertical-align:middle}
.r-cat{color:var(--text);width:44%}
.r-wt{color:var(--text3);width:8%;text-align:center}
.r-bar{width:30%;padding:0 10px}
.r-track{height:5px;background:var(--ice);border-radius:3px;overflow:hidden;border:1px solid var(--pale)}
.r-fill{height:100%;border-radius:3px}
.fill-g{background:var(--green)}
.fill-a{background:var(--amber)}
.fill-r{background:var(--red)}
.r-sc{width:14%;text-align:right;font-weight:600;font-family:'DM Mono',monospace;font-size:11px}
.sc-g{color:var(--green)}
.sc-a{color:var(--amber)}
.sc-r{color:var(--red)}
/* TALK TIME */
.tt-wrap{margin:14px 0}
.tt-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px}
.tt-bar{height:18px;border-radius:4px;overflow:hidden;display:flex;border:1px solid var(--pale)}
.tt-ae{background:var(--navy);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.tt-p{background:var(--ice);display:flex;align-items:center;padding-left:6px}
.tt-ae-lbl{font-size:10px;font-weight:600;color:var(--cyan);font-family:'DM Mono',monospace}
.tt-p-lbl{font-size:10px;font-weight:600;color:var(--text3);font-family:'DM Mono',monospace}
.tt-warn{font-size:11px;color:var(--amber);margin-top:4px}
/* SPICED */
.spiced-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sp-field{background:var(--ice);border:1px solid var(--pale);border-radius:var(--radius-sm);padding:10px 12px}
.sp-full{grid-column:span 2}
.sp-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.sp-wt{font-size:10px;font-weight:500;background:var(--navy);color:var(--cyan);padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace}
.sp-val{font-size:12px;color:var(--text);line-height:1.6}
.sp-missed{color:var(--text3);font-style:italic}
/* SFDC */
.sfdc-list{display:flex;flex-direction:column;gap:8px}
.sfdc-row{display:flex;gap:10px;align-items:flex-start}
.sfdc-lbl{font-size:11px;font-weight:600;color:var(--text3);width:150px;flex-shrink:0;padding-top:8px;text-align:right;text-transform:uppercase;letter-spacing:.5px}
.sfdc-val-wrap{flex:1;position:relative}
.sfdc-val{width:100%;background:var(--ice);border:1px solid var(--pale);border-radius:var(--radius-sm);padding:7px 36px 7px 10px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif;resize:none;line-height:1.5}
.sfdc-val:focus{outline:none;border-color:var(--blue2)}
.copy-btn{position:absolute;right:6px;top:6px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:2px 4px;border-radius:3px;transition:all .15s}
.copy-btn:hover{background:var(--pale);color:var(--navy)}
.copy-btn.copied{color:var(--green)}
/* FOLLOW-UP */
.fp-wrap{background:var(--ice);border:1px dashed var(--pale);border-radius:var(--radius);padding:28px;text-align:center}
.fp-icon{font-size:28px;margin-bottom:8px;opacity:.4}
.fp-title{font-size:14px;font-weight:500;color:var(--text2);margin-bottom:4px}
.fp-desc{font-size:12px;color:var(--text3);line-height:1.6;max-width:380px;margin:0 auto 14px}
.fp-badge{display:inline-flex;align-items:center;gap:5px;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);border-radius:10px;padding:4px 12px;font-size:11px;font-weight:600}
/* COACHING */
.coaching{background:#FFFBEB;border:1px solid #FCD34D;border-radius:var(--radius-sm);padding:10px 14px;margin-top:14px;font-size:12px;color:#92400E;line-height:1.6;display:flex;gap:8px}
/* RESEARCH (ZENDiscovery view) */
.r-wrap{display:flex;flex-direction:column;gap:14px}
.r-cliff{background:var(--navy);border-radius:var(--radius);padding:18px 20px}
.r-cliff-lbl{font-size:10px;font-weight:600;letter-spacing:1px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:6px}
.r-cliff-headline{font-size:14px;font-weight:500;color:#fff;line-height:1.6;margin-bottom:14px}
.r-cliff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r-cliff-cell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);padding:10px 12px}
.r-cliff-cell-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:rgba(255,255,255,.4);margin-bottom:5px}
.r-cliff-cell-val{font-size:12px;color:rgba(255,255,255,.85);line-height:1.55}
.r-signal{background:rgba(102,255,255,.1);border:1px solid rgba(102,255,255,.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--cyan);line-height:1.55;grid-column:span 2;display:flex;gap:8px}
.r-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 16px}
.r-card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.r-card-title::before{content:'——';color:var(--cyan);font-size:10px}
.r-snapshot{font-size:13px;color:var(--text);line-height:1.7;border-left:3px solid var(--cyan);padding-left:12px;margin-bottom:12px}
.r-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.r-stat{background:var(--ice);border-radius:var(--radius-sm);padding:10px 12px;border-top:2px solid var(--cyan)}
.r-stat-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:3px}
.r-stat-val{font-size:14px;font-weight:600;color:var(--navy)}
.r-positioning{background:var(--ice);border-radius:var(--radius-sm);padding:12px 14px;border-left:3px solid var(--cyan);font-size:13px;color:var(--text);line-height:1.6;margin-bottom:10px}
.r-opening-q{background:var(--navy);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:#fff;line-height:1.6;font-style:italic;margin-bottom:10px}
.r-opening-q-lbl{font-size:10px;font-weight:600;color:var(--cyan);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.r-dq-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.r-dq-item{display:flex;gap:10px;font-size:13px;color:var(--text);line-height:1.55}
.r-dq-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:var(--cyan);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.match-card{border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;margin-bottom:9px}
.match-header{padding:10px 14px;background:var(--ice);display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--card-border)}
.match-name{font-size:13px;font-weight:600;color:var(--navy)}
.tier-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
.tier-DIRECT{background:#FEECEC;color:var(--red);border:1px solid var(--red-border)}
.tier-ADJACENT{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.tier-PEER{background:var(--ice);color:var(--blue);border:1px solid var(--pale)}
.match-metrics{margin-left:auto;display:flex;gap:6px}
.metric-chip{background:var(--navy);color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;font-family:'DM Mono',monospace}
.metric-chip span{color:var(--cyan)}
.match-body{padding:10px 14px}
.match-frame{font-size:12px;color:var(--text);font-style:italic;border-left:2px solid var(--cyan);padding-left:10px;line-height:1.55}
.conf-row{display:flex;align-items:center;gap:8px;margin-top:7px}
.conf-track{flex:1;height:4px;background:var(--ice);border-radius:2px;overflow:hidden;border:1px solid var(--pale)}
.conf-fill{height:100%;border-radius:2px;background:var(--cyan)}
.conf-val{font-size:10px;font-weight:600;color:var(--text3);min-width:28px;font-family:'DM Mono',monospace}
.contact-card{border:1px solid var(--card-border);border-radius:var(--radius);overflow:hidden;margin-bottom:9px}
.contact-header{background:var(--navy);padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.contact-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy2);border:2px solid var(--cyan-dim);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--cyan);flex-shrink:0}
.contact-name{font-size:15px;font-weight:600;color:#fff;margin-bottom:2px}
.contact-title{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:8px}
.contact-badges{display:flex;gap:5px;flex-wrap:wrap}
.role-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(102,255,255,.15);color:var(--cyan);border:1px solid rgba(102,255,255,.3)}
.contact-body{padding:14px 16px}
.contact-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:6px}
.approach-box{background:var(--ice);border-left:3px solid var(--cyan);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:8px 12px;font-size:12px;color:var(--text);line-height:1.55;margin-bottom:10px}
.rapport-list{list-style:none;display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.rapport-list li{display:flex;gap:7px;font-size:12px;color:var(--text2);line-height:1.5}
.rapport-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--cyan);flex-shrink:0;margin-top:6px}
.contact-flag{display:flex;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);font-size:11px;margin-top:5px}
.flag-info{background:var(--ice);border:1px solid var(--pale);color:var(--text2)}
.flag-warning{background:var(--amber-bg);border:1px solid var(--amber-border);color:#92400E}
.flag-critical{background:var(--red-bg);border:1px solid var(--red-border);color:#991B1B}
.flag-icon{font-weight:700;flex-shrink:0}
.no-match{text-align:center;padding:20px;color:var(--text3);font-size:13px}
.news-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--card-border)}
.news-item:last-child{border-bottom:none}
.news-date{font-size:10px;font-weight:600;color:var(--blue2);white-space:nowrap;margin-top:2px;min-width:55px}
.news-headline{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.news-rel{font-size:11px;color:var(--blue);display:flex;gap:4px}
.news-rel::before{content:'→';color:var(--cyan);flex-shrink:0}
/* PRIOR EMPLOYMENT */
.prior-card{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);border-radius:var(--radius);padding:16px 18px;margin-bottom:9px;border:1px solid var(--navy3)}
.prior-title{font-size:12px;font-weight:600;color:var(--cyan);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.prior-body{font-size:12px;color:rgba(255,255,255,.8);line-height:1.6;margin-bottom:8px}
.prior-ref{font-size:12px;color:#fff;font-style:italic;background:rgba(102,255,255,.08);padding:8px 12px;border-radius:var(--radius-sm);border-left:2px solid var(--cyan);line-height:1.55}
/* FOLLOW-UP FORM */
.fu-wrap{display:flex;flex-direction:column;gap:14px}
.fu-intro{font-size:12px;color:var(--text3);line-height:1.6;margin-bottom:4px}
.fu-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);display:flex;align-items:center;gap:8px;margin-top:4px}
.fu-section-lbl::before{content:'——';color:var(--cyan);font-size:10px}
.fu-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fu-field{display:flex;flex-direction:column;gap:4px}
.fu-field-full{grid-column:span 3}
.fu-field-half{grid-column:span 1}
.fu-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}

.fu-status{font-size:12px;color:var(--text3)}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px}

async function generatePDF(id){
  const btn=document.getElementById('fu_'+id+'_btn');
  const status=document.getElementById('fu_'+id+'_status');
  const get=fid=>document.getElementById('fu_'+id+'_'+fid);
  const fields={
    client:get('client').value,seller:get('seller').value,
    email:get('email').value,phone:get('phone').value,linkedin:get('linkedin').value,
    situation:get('situation').value,challenges:get('challenges').value,icp:get('icp').value
  };
  btn.disabled=true; status.textContent='Building slides…';
  try{
    const W=1280,H=720;
    const slides=buildSlideHTML(fields,W,H);
    const container=document.createElement('div');
    container.style.cssText='position:fixed;left:-9999px;top:0;width:'+W+'px;';
    document.body.appendChild(container);
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'landscape',unit:'px',format:[W,H]});
    for(let i=0;i<slides.length;i++){
      status.textContent='Rendering slide '+(i+1)+' of '+slides.length+'…';
      container.innerHTML=slides[i];
      container.style.height=H+'px';
      await new Promise(r=>setTimeout(r,100));
      const canvas=await html2canvas(container.firstChild,{width:W,height:H,scale:1,useCORS:true,logging:false,backgroundColor:null});
      if(i>0) doc.addPage([W,H],'landscape');
      doc.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,W,H);
    }
    document.body.removeChild(container);
    doc.save('DemandZEN_'+fields.client.replace(/\s+/g,'_')+'_PostDiscovery.pdf');
    status.textContent='✓ Downloaded!';
    setTimeout(()=>{status.textContent='';},3000);
  }catch(e){
    status.textContent='Error: '+e.message;
    console.error(e);
  }
  btn.disabled=false;
}

    <div style="font-size:10px;font-weight:600;letter-spacing:2px;color:${text2};text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:30px;height:2px;background:${cyan}"></span>OUR MUTUAL ACTION PLAN &amp; ONBOARDING PROCESS</div>
    <div style="font-size:46px;font-weight:700;color:${text};margin-bottom:8px">From <span style="color:#0096D1">here</span> to your first meeting.</div>
    <div style="font-size:13px;color:${text2};margin-bottom:28px">If we both decide there's a fit, here's the journey from that decision through your first booked meetings — a proven path we've run across 300+ programs.</div>
    <div style="display:flex;align-items:flex-start;gap:0">
      ${circStyle('01','Validate','DemandZEN Differentiation')}${lineDiv}
      ${circStyle('02','Align','Decision Process')}${lineDiv}
      ${circStyle('03','Sign','Contract & Signatures')}${lineDiv}
      <div style="display:flex;flex-direction:column;align-items:center;min-width:120px"><div style="width:56px;height:56px;border-radius:50%;background:${navy};display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px">🚀</div><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:${navy};text-transform:uppercase;margin-bottom:4px;text-align:center">Get Started!</div><div style="font-size:12px;font-weight:700;color:${text};text-align:center">Program Kickoff</div></div>${lineDiv}
      ${circStyle('W1','Week 1','Kickoff & Planning')}${lineDiv}
      ${circStyle('W2','Week 2','Active Outreach Begins')}${lineDiv}
      ${circStyle('W3','Week 3','Optimization & Expansion')}
    </div>
    <div style="display:flex;gap:16px;margin-top:24px">
      <div style="flex:1;border:1px solid ${pale};border-radius:6px;padding:10px 16px;font-size:11px;color:${text2};display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:${navy};display:inline-block"></span>SALES PROCESS · REACHING AGREEMENT</div>
      <div style="flex:1;border:1px solid ${pale};border-radius:6px;padding:10px 16px;font-size:11px;color:${text2};display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:#0096D1;display:inline-block"></span>3-WEEK ONBOARDING · LIVE PROGRAM</div>
    </div>
    <div style="position:absolute;bottom:18px;left:56px;font-size:11px;font-weight:700;color:${text}">Demand<span style="color:#0096D1">ZEN</span></div>
    <div style="position:absolute;bottom:18px;right:56px;font-size:10px;color:${text2};letter-spacing:1px">SLIDE 06 · MUTUAL ACTION PLAN</div>
  </div>`;

  return[s1,s2,s3,s4,s5,s6];
}

function renderUpcoming(){
  const grid=document.getElementById('uc-grid');
  const filtered=UPCOMING.filter(u=>activeRep==='all'||u.rk===activeRep);
  document.getElementById('uc-count').textContent=filtered.length;
  if(!filtered.length){grid.innerHTML='<div class="empty-state">No upcoming calls for this rep</div>';return;}
  grid.innerHTML=filtered.map(u=>`
    <div class="upcoming-card">
      <div class="uc-top-bar ${u.zdcDone?'bar-done':'bar-pending'}"></div>
      <div class="uc-body">
        <div class="uc-company">${esc(u.prospect)}</div>
        <div class="uc-meta">${esc(u.date)} &nbsp;·&nbsp; ${esc(u.time)} &nbsp;·&nbsp; ${esc(u.rep)}</div>
        <div class="uc-row"><span class="uc-label">Pre-call Research</span><span class="badge ${u.zdcDone?'badge-done':'badge-pending'}">${u.zdcDone?'✓ Complete':'⏳ Pending'}</span></div>
        ${u.priorDZ?`<div class="uc-row"><span class="uc-label">Signal</span><span class="badge badge-prior">★ Prior DZ Client</span></div><div class="uc-prior-note">${esc(u.priorNote)}</div>`:''}
        <div class="uc-label" style="margin-bottom:4px">Attendees</div>
        <div>${u.contacts.map(c=>`<span class="contact-chip">${esc(c)}</span>`).join('')}</div>
        <div class="uc-actions">
          <button class="btn btn-navy" onclick="openResearchModal('${u.id}')">📋 View Research</button>
        </div>
      </div>
    </div>
  `).join('');
}

function renderCalls(){
  const list=document.getElementById('pc-list');
  const filtered=CALLS.filter(c=>activeRep==='all'||c.rk===activeRep);
  document.getElementById('pc-count').textContent=filtered.length;
  if(!filtered.length){list.innerHTML='<div class="empty-state">No calls recorded for this rep</div>';return;}
  const cards=filtered.map(c=>{
    try{return buildCard(c);}
    catch(e){return '<div class="call-card" style="padding:16px 20px;color:var(--red)">Error rendering '+c.prospect+': '+e.message+'</div>';}
  });
  list.innerHTML=cards.join('');
}

function buildCard(c){
  const s=sc(c.score);
  const ruRows=c.rubric.map(r=>{
    const pct=Math.round(r.s/r.w*100);
    return `<tr><td class="r-cat">${esc(r.c)}</td><td class="r-wt">${r.w}%</td><td class="r-bar"><div class="r-track"><div class="r-fill ${fc(r.s,r.w)}" style="width:${pct}%"></div></div></td><td class="r-sc ${cc(r.s,r.w)}">${r.s}/${r.w}</td></tr>`;
  }).join('');

  const spFields=[
    {lbl:'S — Situation',wt:'10%'},{lbl:'P — Pain Probing',wt:'20%'},
    {lbl:'I — Impact',wt:'15%'},{lbl:'C — Critical Event',wt:'10%'},
    {lbl:'E/D — Decision Process',wt:'5%'}
  ];
  const spHtml=spFields.map((f,i)=>{
    const v=c.spiced[i]||'';
    const miss=v.startsWith('MISSED');
    const full=(f.k==='s'||f.k==='p')?'sp-full':'';
    return `<div class="sp-field ${full}"><div class="sp-label">${esc(f.lbl)}<span class="sp-wt">${f.wt}</span></div><div class="sp-val ${miss?'sp-missed':''}">${esc(v)}</div></div>`;
  }).join('');

  const scoreLabel=c.score>=60?'Strong':c.score>=40?'Average':'Needs Improvement';
  const sfdcFields=[
    {l:'Account',v:c.prospect},{l:'Opportunity Stage',v:'Discovery Complete'},
    {l:'Situation (S)',v:c.spiced[0].replace(/^MISSED — |^PARTIAL — /,'')},
    {l:'Pain / Challenge (P)',v:c.spiced[1].replace(/^MISSED — |^PARTIAL — /,'')},
    {l:'Impact (I)',v:c.spiced[2].replace(/^MISSED — |^PARTIAL — /,'')},
    {l:'Critical Event (C)',v:c.spiced[3].replace(/^MISSED — |^PARTIAL — /,'')},
    {l:'Decision Process (E/D)',v:c.spiced[4].replace(/^MISSED — |^PARTIAL — /,'')},
    {l:'Call Score',v:`${c.score}/100 — ${scoreLabel}`},
    {l:'Next Steps',v:'Follow-up call scheduled. See meeting notes in Fellow.'},
  ];
  const sfdcHtml=sfdcFields.map((f,i)=>`
    <div class="sfdc-row">
      <div class="sfdc-lbl">${esc(f.l)}</div>
      <div class="sfdc-val-wrap">
        <textarea class="sfdc-val" id="sf_${c.id}_${i}" rows="2">${esc(f.v)}</textarea>
        <button class="copy-btn" onclick="copyField('sf_${c.id}_${i}',this)">⎘</button>
      </div>
    </div>`).join('');

  return `
  <div class="call-card" id="card_${c.id}">
    <div class="call-header" onclick="toggleCard('${c.id}')">
      <div class="score-circle ${s}"><span class="score-num">${c.score}</span><span class="score-denom">/100</span></div>
      <div class="call-info">
        <div class="call-company">${esc(c.prospect)}</div>
        <div class="call-meta-row">
          <span class="call-date">${esc(c.date)}</span>
          <span class="rep-chip">${esc(c.rep)}</span>
          <span class="status-chip complete-chip">● Complete</span>
        </div>
        <div class="flag-row">
          ${c.tt.f?`<span class="flag flag-talk">⚠ AE Talk ${c.tt.ae}%</span>`:''}
          ${c.comp.length?`<span class="flag flag-comp">⚡ ${c.comp.join(', ')}</span>`:''}
          ${c.clients.length?`<span class="flag flag-client">★ ${c.clients.join(', ')}</span>`:''}
        </div>
      </div>
      <div class="call-right">
        <span class="zdc-chip zdc-done">✓ Research Done</span>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="call-body">
      <div class="body-tabs">
        <div class="body-tab active" onclick="switchTab('${c.id}','ov',this)">Overview</div>
        <div class="body-tab" onclick="switchTab('${c.id}','sp',this)">SPICED</div>
        <div class="body-tab" onclick="switchTab('${c.id}','sf',this)">SFDC Entry</div>
        <div class="body-tab" onclick="switchTab('${c.id}','res',this)">Research</div>
        <div class="body-tab" onclick="switchTab('${c.id}','fu',this)">Follow-up</div>
      </div>
      <div class="body-panel active" id="p_${c.id}_ov">
        <div class="two-col">
          <div>
            <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:10px">Rubric Breakdown</div>
            <table class="rubric-table">${ruRows}</table>
          </div>
          <div>
            <div class="tt-wrap">
              <div class="tt-label">Talk Time Ratio</div>
              <div class="tt-bar">
                <div class="tt-ae" style="width:${c.tt.ae}%"><span class="tt-ae-lbl">AE ${c.tt.ae}%</span></div>
                <div class="tt-p" style="width:${c.tt.p}%"><span class="tt-p-lbl">Prospect ${c.tt.p}%</span></div>
              </div>
              ${c.tt.f?`<div class="tt-warn">⚠ AE dominated — aim for under 50% on discovery calls</div>`:''}
            </div>
            ${c.comp.length||c.clients.length?`<hr class="divider">
              ${c.comp.length?`<div style="margin-bottom:8px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:5px">Competitors Mentioned</div>${c.comp.map(x=>`<span class="flag flag-comp" style="margin:2px">${esc(x)}</span>`).join('')}</div>`:''}
              ${c.clients.length?`<div><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:5px">DZ Clients Referenced</div>${c.clients.map(x=>`<span class="flag flag-client" style="margin:2px">${esc(x)}</span>`).join('')}</div>`:''}
            `:''}
          </div>
        </div>
        <div class="coaching"><span style="flex-shrink:0">💡</span><span>${esc(c.coaching)}</span></div>
      </div>
      <div class="body-panel" id="p_${c.id}_sp">
        <div class="spiced-grid">${spHtml}</div>
      </div>
      <div class="body-panel" id="p_${c.id}_sf">
        <div style="font-size:12px;color:var(--text3);margin-bottom:14px">Copy each field into your Salesforce opportunity. All fields are editable.</div>
        <div class="sfdc-list">${sfdcHtml}</div>
      </div>
      <div class="body-panel" id="p_${c.id}_res" data-zdc-key="${c.id}" data-loaded="false">
        <div style="padding:20px;text-align:center;color:var(--text3)">Loading research...</div>
      </div>
      <div class="body-panel" id="p_${c.id}_fu" data-loaded="false">
        <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Loading...</div>
      </div>
      </div>
    </div>
  </div>`;
}

function buildResearch(zdcKey){
  const d=ZDC[zdcKey];
  if(!d) return '<div class="no-match">Research data not available.</div>';
  const co=d.company||{};
  const cn=d.cliff_notes||{};
  const dp=d.dz_positioning||{};
  const matches=d.client_matches||[];
  const contacts=d.contacts||[];
  const news=d.news||[];
  const prior=d.prior_employment||[];
  const fund=d.funding||{};
  const cp=d.competitive_position||{};

  // Cliff notes
  let cliffHtml=`<div class="r-cliff">
    <div class="r-cliff-lbl">Cliff Notes — ${esc(co.name||d.meta?.prospect)}</div>
    <div class="r-cliff-headline">${esc(cn.one_liner||'')}</div>
    <div class="r-cliff-grid">
      <div class="r-signal"><span style="flex-shrink:0;font-weight:700;color:var(--cyan)">★</span><span>${esc(cn.most_important_signal||'')}</span></div>
      <div class="r-cliff-cell"><div class="r-cliff-cell-lbl">Single Best Angle</div><div class="r-cliff-cell-val">${esc(cn.single_best_angle||'')}</div></div>
      <div class="r-cliff-cell"><div class="r-cliff-cell-lbl">Most Likely Objection</div><div class="r-cliff-cell-val">${esc(cn.most_likely_objection||'')}</div></div>
      <div class="r-cliff-cell" style="grid-column:span 2"><div class="r-cliff-cell-lbl">Watch Out</div><div class="r-cliff-cell-val">${esc(cn.watch_out||'')}</div></div>
    </div>
  </div>`;

  // Company
  let statsHtml='';
  if(co.employees||co.founded||co.hq||fund.stage){
    const stats=[
      co.employees?{l:'Employees',v:co.employees}:null,
      co.founded?{l:'Founded',v:co.founded}:null,
      fund.stage?{l:'Funding',v:fund.stage+(fund.total_raised?' · '+fund.total_raised:'')}:null,
      co.hq?{l:'HQ',v:co.hq}:null,
    ].filter(Boolean);
    statsHtml=`<div class="r-stat-grid">${stats.map(s=>`<div class="r-stat"><div class="r-stat-lbl">${esc(s.l)}</div><div class="r-stat-val">${esc(s.v)}</div></div>`).join('')}</div>`;
  }
  let companyHtml=`<div class="r-card"><div class="r-card-title">Company Overview</div>
    <div class="r-snapshot">${esc(co.snapshot||'')}</div>
    ${statsHtml}
  </div>`;

  // Positioning
  const dqs=(dp.discovery_questions||[]).slice(0,3);
  let posHtml=`<div class="r-card"><div class="r-card-title">DZ Positioning</div>
    <div class="r-positioning">${esc(dp.recommended_pitch_angle||dp.single_best_angle||'')}</div>
    <div class="r-opening-q"><div class="r-opening-q-lbl">Opening Question</div>${esc(dp.opening_question||'')}</div>
    ${dqs.length?`<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:8px">Discovery Questions</div>
    <ul class="r-dq-list">${dqs.map((q,i)=>`<li><span class="r-dq-num">${i+1}</span><span>${esc(q)}</span></li>`).join('')}</ul>`:''}
  </div>`;

  // Prior employment
  let priorHtml='';
  if(prior.length){
    priorHtml=`<div class="r-card"><div class="r-card-title">Prior Employment Connection</div>
      ${prior.map(p=>`<div class="prior-card">
        <div class="prior-title">🔗 ${esc(p.contact)} previously at ${esc(p.client)}</div>
        <div class="prior-body">${esc(p.overlap_explanation||'')}</div>
        <div class="prior-ref">"${esc(p.suggested_reference||'')}"</div>
      </div>`).join('')}
    </div>`;
  }

  // Matches
  let matchHtml='';
  if(matches.length){
    const top=matches.slice(0,4);
    matchHtml=`<div class="r-card"><div class="r-card-title">Client Matches (${matches.length})</div>
      ${top.map(m=>`<div class="match-card">
        <div class="match-header">
          <div class="match-name">${esc(m.name)}</div>
          <span class="tier-badge tier-${m.tier||'PEER'}">${m.tier||'PEER'}</span>
          <div class="match-metrics">
            <span class="metric-chip"><span>${m.months}</span>mo</span>
            <span class="metric-chip"><span>${m.total_meetings}</span> mtgs</span>
            <span class="metric-chip"><span>${m.avg_monthly}</span>/mo</span>
          </div>
        </div>
        <div class="match-body">
          <div class="match-frame">"${esc(m.call_frame||'')}"</div>
          <div class="conf-row"><span style="font-size:11px;color:var(--text3)">Confidence</span><div class="conf-track"><div class="conf-fill" style="width:${m.confidence||0}%"></div></div><span class="conf-val">${m.confidence}%</span></div>
        </div>
      </div>`).join('')}
    </div>`;
  } else {
    matchHtml=`<div class="r-card"><div class="r-card-title">Client Matches</div><div class="no-match" style="text-align:left;padding:0">No direct client matches found in the DZ database for this prospect's space.</div></div>`;
  }

  // Contacts
  let contactHtml='';
  if(contacts.length){
    contactHtml=`<div class="r-card"><div class="r-card-title">Contact Profiles</div>
      ${contacts.map(ct=>`<div class="contact-card">
        <div class="contact-header">
          <div class="contact-avatar">${esc(initials(ct.name))}</div>
          <div>
            <div class="contact-name">${esc(ct.name||'Unknown')}</div>
            <div class="contact-title">${esc(ct.title||'')} &nbsp;·&nbsp; ${esc(co.name||'')}</div>
            <div class="contact-badges">
              ${ct.decision_role?`<span class="role-badge">${esc(ct.decision_role)}</span>`:''}
              ${ct.seniority_assessment?`<span class="role-badge">${esc(ct.seniority_assessment)}</span>`:''}
              ${ct.open_to_work?`<span class="role-badge" style="background:rgba(220,38,38,.2);color:#FCA5A5;border-color:rgba(220,38,38,.4)">Open to Work</span>`:''}
            </div>
          </div>
        </div>
        <div class="contact-body">
          ${ct.approach?`<div class="contact-section-title">Approach</div><div class="approach-box">${esc(ct.approach)}</div>`:''}
          ${ct.rapport&&ct.rapport.length?`<div class="contact-section-title">Rapport Notes</div><ul class="rapport-list">${ct.rapport.map(r=>`<li>${esc(r)}</li>`).join('')}</ul>`:''}
          ${ct.flags&&ct.flags.length?ct.flags.map(f=>`<div class="contact-flag flag-${f.severity||'info'}"><span class="flag-icon">${f.severity==='warning'?'⚠':'ℹ'}</span><span>${esc(f.text||'')}</span></div>`).join(''):''}
        </div>
      </div>`).join('')}
    </div>`;
  }

  // News
  let newsHtml='';
  if(news.length){
    newsHtml=`<div class="r-card"><div class="r-card-title">Recent News</div>
      ${news.slice(0,4).map(n=>`<div class="news-item">
        <div class="news-date">${esc(n.date||'')}</div>
        <div><div class="news-headline">${esc(n.headline||'')}</div><div class="news-rel">${esc(n.relevance_to_dz||n.summary||'')}</div></div>
      </div>`).join('')}
    </div>`;
  }

  return `<div class="r-wrap">${cliffHtml}${companyHtml}${posHtml}${priorHtml}${matchHtml}${contactHtml}${newsHtml}</div>`;
}

function openResearchModal(id){
  const d = ZDC[id];
  if(!d){alert('Research data not available.');return;}
  let modal = document.getElementById('research-modal');
  if(!modal){
    modal = document.createElement('div');
    modal.id = 'research-modal';
    modal.style.cssText='position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;background:rgba(20,34,93,0.7);backdrop-filter:blur(3px)';
    modal.innerHTML=`<div style="background:#F0F5FB;flex:1;overflow-y:auto;display:flex;flex-direction:column;max-height:100vh"><div style="background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--navy2)"><div style="font-size:15px;font-weight:600;color:#fff" id="modal-title">Research</div><button onclick="document.getElementById('research-modal').remove()" style="background:transparent;border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit">✕ Close</button></div><div style="padding:24px 32px;max-width:960px;margin:0 auto;width:100%" id="modal-body"></div></div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e=>{ if(e.target===modal) modal.remove(); });
  }
  document.getElementById('modal-title').textContent = (d.meta && d.meta.prospect) ? d.meta.prospect + ' — ZENDiscovery Research' : 'Research';
  document.getElementById('modal-body').innerHTML = buildResearch(id);
  document.getElementById('research-modal').style.display='flex';
}

function toggleCard(id){document.getElementById('card_'+id).classList.toggle('open');}
function switchTab(cid,tab,el){
  if(tab==='res'){openResearchModal(cid);return;}
  const body=document.getElementById('card_'+cid).querySelector('.call-body');
  body.querySelectorAll('.body-tab').forEach(t=>t.classList.remove('active'));
  body.querySelectorAll('.body-panel').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  const panel=document.getElementById('p_'+cid+'_'+tab);
  panel.classList.add('active');
  if(tab==='fu'&&panel.dataset.loaded==='false'){
    const c=CALLS.find(x=>x.id===cid);
    if(c){panel.innerHTML=buildFollowUp(c);panel.dataset.loaded='true';}
  }
}
function copyField(fid,btn){
  const el=document.getElementById(fid);el.select();document.execCommand('copy');
  const o=btn.textContent;btn.textContent='✓';btn.classList.add('copied');
  setTimeout(()=>{btn.textContent=o;btn.classList.remove('copied');},1500);
}
document.addEventListener('input',e=>{if(e.target.classList.contains('sfdc-val')){e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';}});
